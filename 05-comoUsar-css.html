<!--css externo-->
<!--Los estilos externos se definen dentro del elemento <link>,
dentro de la sección <head> -->

<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="mystyle.css">
</head>
<body>

<h1>This is a heading</h1>
<p>This is a paragraph.</p>

</body>
</html> 

<!--css interno-->
<!--El estilo interno se define dentro del elemento <style>, 
dentro de la sección head-->

<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: linen;
}

h1 {
  color: maroon;
  margin-left: 40px;
}
</style>
</head>
<body>

<h1>This is a heading</h1>
<p>This is a paragraph.</p>

</body>
</html>

<!--css en linea-->
<!--Los estilos en línea se definen dentro del 
atributo "style" del elemento correspondiente-->

<!DOCTYPE html>
<html>
<body>

<h1 style="color:blue;text-align:center;">This is a heading</h1>
<p style="color:red;">This is a paragraph.</p>

</body>
</html>
