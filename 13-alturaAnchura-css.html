<!--heighty se utilizan para establecer la altura y el ancho de un elemento. width-->
<!--altura y ancho-->
<!DOCTYPE html>
<html>
<head>
<style>
div {
  height: 200px;
  width: 50%;
  background-color: powderblue;
}
</style>
</head>
<body>

<h2>Set the height and width of an element</h2>

<div>This div element has a height of 200px and a width of 50%.</div>

<!--Altura y anchura mínimas/máximas -->
<!--Un elemento <div> con un ancho máximo de 500 píxeles y un elemento <div> con un ancho de 500 píxeles-->
.div1 {
  max-width: 500px;
  background-color: powderblue;
}

.div2 {
  width: 500px;
  background-color: powderblue;
}

</body>
</html>
