<!DOCTYPE html>
<html>
<head>
<style>
div {
  padding: 70px;
  border: 1px solid #4CAF50;
}
</style>
</head>
<body>

<h2>CSS Padding</h2>
<div>This element has a padding of 70px.</div>

</body>
</html>

<!--lados individuales-->
div {
  padding-top: 50px;
  padding-right: 30px;
  padding-bottom: 50px;
  padding-left: 80px;
}

<!--propiedad taquigrafica-->
<!--4 valores-->
div {
  padding: 25px 50px 75px 100px;
}

<!--Relleno y ancho del elemento-->
div {
  width: 300px;
  padding: 25px;
}
